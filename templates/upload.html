<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传文档 - 文档管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .upload-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,.10);
        }
        .drop-zone {
            border: 2px dashed #c3c8d4;
            border-radius: 12px;
            padding: 36px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color .2s, background .2s;
            user-select: none;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #0d6efd;
            background: #f0f5ff;
        }
        .drop-zone .drop-icon {
            font-size: 2.6rem;
            color: #adb5bd;
            transition: color .2s;
        }
        .drop-zone.has-file .drop-icon { color: #0d6efd; }
        .drop-zone.has-file { border-color: #0d6efd; background: #f0f5ff; }
    </style>
</head>
<body>

<!-- 顶部导航栏 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-folder2-open me-2"></i>文档管理系统
        </a>
        <a href="/" class="btn btn-outline-light btn-sm ms-auto">
            <i class="bi bi-arrow-left me-1"></i>返回列表
        </a>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <!-- 提示区（动态显示成功/失败消息） -->
            <div id="alert-area" class="mb-3"></div>

            <div class="card upload-card">
                <div class="card-body p-4 p-md-5">
                    <h5 class="fw-bold mb-1">上传新文档</h5>
                    <p class="text-muted small mb-4">填写文档信息并选择要上传的文件</p>

                    <form id="upload-form" novalidate>

                        <!-- 文件拖拽区域 -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                选择文件 <span class="text-danger">*</span>
                            </label>
                            <div class="drop-zone" id="drop-zone"
                                 onclick="document.getElementById('file-input').click()">
                                <div class="drop-icon mb-2">
                                    <i class="bi bi-cloud-arrow-up" id="drop-icon"></i>
                                </div>
                                <p class="mb-1 fw-semibold" id="drop-text">点击或拖拽文件到此处</p>
                                <p class="text-muted small mb-0" id="drop-hint">
                                    支持 PDF、Word、Excel、图片等常见格式
                                </p>
                            </div>
                            <!-- 隐藏的原生 file input -->
                            <input type="file" id="file-input" class="d-none">
                        </div>

                        <!-- 文档标题 -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                文档标题 <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" id="title"
                                   placeholder="请输入文档标题" maxlength="255">
                        </div>

                        <!-- 作者 -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                作者 <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" id="author"
                                   placeholder="请输入作者姓名" maxlength="255">
                        </div>

                        <!-- 价格 -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                价格 <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">¥</span>
                                <input type="number" class="form-control" id="price"
                                       placeholder="0.00" min="0" step="0.01" value="0">
                            </div>
                        </div>

                        <!-- 描述（选填） -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">描述
                                <span class="text-muted fw-normal">（选填）</span>
                            </label>
                            <textarea class="form-control" id="description" rows="3"
                                      placeholder="简单描述这份文档的内容"
                                      maxlength="255"></textarea>
                        </div>

                        <!-- 提交按钮 -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">
                                <i class="bi bi-cloud-upload me-2"></i>上传文档
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const dropZone  = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    let selectedFile = null;

    // ── 拖拽事件 ──────────────────────────────────────────
    dropZone.addEventListener('dragover', e => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) applyFile(file);
    });

    // ── 点击选择文件 ───────────────────────────────────────
    fileInput.addEventListener('change', () => {
        if (fileInput.files[0]) applyFile(fileInput.files[0]);
    });

    function applyFile(file) {
        selectedFile = file;
        dropZone.classList.add('has-file');
        document.getElementById('drop-icon').className = 'bi bi-file-earmark-check';
        document.getElementById('drop-text').textContent = file.name;
        document.getElementById('drop-hint').textContent =
            (file.size / 1024 / 1024).toFixed(2) + ' MB';
    }

    // ── 显示顶部提示 ───────────────────────────────────────
    function showAlert(msg, type = 'danger') {
        const icon = type === 'success' ? 'check-circle' : 'exclamation-circle';
        document.getElementById('alert-area').innerHTML =
            `<div class="alert alert-${type} alert-dismissible d-flex align-items-center" role="alert">
                <i class="bi bi-${icon} me-2"></i>
                <span>${msg}</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
             </div>`;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── 表单提交 ───────────────────────────────────────────
    document.getElementById('upload-form').addEventListener('submit', async e => {
        e.preventDefault();

        // 前端基础校验
        const title  = document.getElementById('title').value.trim();
        const author = document.getElementById('author').value.trim();
        const price  = document.getElementById('price').value;
        const desc   = document.getElementById('description').value.trim();

        if (!selectedFile)  { showAlert('请先选择要上传的文件'); return; }
        if (!title)         { showAlert('文档标题不能为空');     return; }
        if (!author)        { showAlert('作者不能为空');         return; }
        if (price === '' || parseFloat(price) < 0) {
            showAlert('请输入有效的价格（≥ 0）'); return;
        }

        // 组装 multipart/form-data
        const formData = new FormData();
        formData.append('file',   selectedFile);
        formData.append('title',  title);
        formData.append('author', author);
        formData.append('price',  price);
        if (desc) formData.append('description', desc);

        // 按钮进入加载态
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>上传中...';

        try {
            const res = await fetch('/books/upload', { method: 'POST', body: formData });
            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                throw new Error(data.detail || '上传失败，请重试');
            }
            showAlert('上传成功！即将跳转到文档列表…', 'success');
            setTimeout(() => window.location.href = '/', 1400);
        } catch (err) {
            showAlert(err.message);
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-cloud-upload me-2"></i>上传文档';
        }
    });
</script>
</body>
</html>
